<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Jajod - Admin Portal</title>
    <style>
        :root { --dark: #0d1b3e; --blue: #007BFF; --light: #f4f7f9; --border: #d1d9e6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--light); color: #333; }
        .app-shell { width: 100%; max-width: 480px; min-height: 100vh; background: white; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.1); display: flex; flexDirection: column; }
        .hidden { display: none !important; }
        
        /* Professional Header */
        .header { background: var(--dark); color: white; padding: 18px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .btn-logout { background: transparent; border: 1px solid #ffffff55; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Forms & Inputs */
        .section-title { padding: 15px; margin: 0; background: #f9f9f9; border-bottom: 1px solid var(--border); font-size: 14px; color: #666; text-transform: uppercase; }
        .card { padding: 15px; border-bottom: 1px solid #eee; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .primary-btn { background: var(--blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        /* Student Management List */
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .edit-link { color: var(--blue); cursor: pointer; font-weight: 600; text-decoration: underline; }

        /* Grid for Students */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
        .menu-item { background: white; padding: 20px 10px; text-align: center; cursor: pointer; }
        .menu-item:active { background: #f0f4ff; }
        .menu-icon { font-size: 22px; display: block; margin-bottom: 8px; }
        .menu-label { font-size: 12px; font-weight: 500; color: #444; }

        /* Attendance & Stats */
        .stats-bar { display: flex; border-bottom: 1px solid var(--border); }
        .stat-item { flex: 1; padding: 15px; text-align: center; border-right: 1px solid var(--border); }
        .stat-val { display: block; font-size: 18px; font-weight: 700; color: var(--dark); }
        .stat-lbl { font-size: 11px; color: #888; }
    </style>
</head>
<body>

<div class="app-shell">

    <div id="sc-login" style="padding: 80px 30px; text-align: center;">
        <h1 style="color: var(--dark); letter-spacing: -1px;">RPS JAJOD</h1>
        <p style="color: #888;">Administrative Access</p>
        <div style="margin-top: 40px;">
            <input type="text" id="log-id" placeholder="Mobile Number or Username">
            <button class="primary-btn" onclick="app.login()">Secure Login</button>
        </div>
    </div>

    <div id="sc-teacher" class="hidden">
        <div class="header"><span>MASTER ADMIN</span> <button class="btn-logout" onclick="location.reload()">LOGOUT</button></div>
        
        <h3 class="section-title">Edit / Add Student</h3>
        <div class="card">
            <input type="text" id="t-mob" placeholder="Mobile Number (Login ID) *">
            <input type="text" id="t-name" placeholder="Full Name">
            <input type="text" id="t-class" placeholder="Class/Section">
            <input type="number" id="t-fees" placeholder="Pending Fees (₹)">
            <input type="number" id="t-att" placeholder="Overall Attendance %">
            <label style="font-size: 12px; color: #888;">Profile Photo:</label>
            <input type="file" id="t-photo" accept="image/*">
            <button class="primary-btn" onclick="app.saveStudent()">Update Record</button>
        </div>

        <h3 class="section-title">Manage Content (Exams, HW, etc.)</h3>
        <div class="card">
            <select id="content-type">
                <option value="exam">Update Exam Timetable</option>
                <option value="tt">Update Weekly Timetable</option>
                <option value="sy">Update Syllabus</option>
                <option value="hw">Update Daily Homework</option>
            </select>
            <textarea id="content-val" placeholder="Type details here..." rows="3"></textarea>
            <button class="primary-btn" style="background:#333;" onclick="app.updateGlobalContent()">Publish to All</button>
        </div>

        <h3 class="section-title">All Students List</h3>
        <div id="stu-list-container" style="background: white;"></div>
    </div>

    <div id="sc-student" class="hidden">
        <div class="header"><span>RPS STUDENT PORTAL</span> <button class="btn-logout" onclick="location.reload()">LOGOUT</button></div>
        
        <div class="card" style="display:flex; align-items:center; gap:15px; background: #fff;">
            <img id="s-img" style="width:60px; height:60px; border-radius:50%; object-fit:cover; border: 2px solid #eee;">
            <div>
                <h2 id="s-name" style="margin:0; font-size: 18px;">Name</h2>
                <span id="s-class" style="color:#888; font-size: 13px;">Class</span>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><span class="stat-val" id="s-att">0%</span><span class="stat-lbl">ATTENDANCE</span></div>
            <div class="stat-item" style="color: #c53030;"><span class="stat-val" id="s-fees">₹0</span><span class="stat-lbl">PENDING FEES</span></div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="app.openDetail('Homework', 'hw')"><span class="menu-icon">📚</span><span class="menu-label">Homework</span></div>
            <div class="menu-item" onclick="app.openDetail('Exam', 'exam')"><span class="menu-icon">📝</span><span class="menu-label">Exam</span></div>
            <div class="menu-item" onclick="app.openDetail('Timetable', 'tt')"><span class="menu-icon">📅</span><span class="menu-label">Timetable</span></div>
            <div class="menu-item" onclick="app.openDetail('Syllabus', 'sy')"><span class="menu-icon">📋</span><span class="menu-label">Syllabus</span></div>
            <div class="menu-item" onclick="app.openDetail('Transport', 'tr')"><span class="menu-icon">🚌</span><span class="menu-label">Transport</span></div>
            <div class="menu-item" onclick="app.openDetail('Notice', 'no')"><span class="menu-icon">🔔</span><span class="menu-label">Notice</span></div>
        </div>

        <div id="sc-detail" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:200;">
            <div class="header"><span id="det-title">Details</span> <button class="btn-logout" onclick="app.closeDetail()">CLOSE</button></div>
            <div class="card" id="det-body" style="white-space: pre-wrap; line-height: 1.6;"></div>
        </div>
    </div>

</div>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('rps_pro_db')) || [],
    global: JSON.parse(localStorage.getItem('rps_global')) || { exam:'', tt:'', sy:'', hw:'', no:'Welcome to RPS Jajod.' },

    login: function() {
        const val = document.getElementById('log-id').value.trim();
        if(val === "9999") { this.show('sc-teacher'); this.renderList(); return; }
        const s = this.db.find(x => x.mobile === val || x.name.toLowerCase() === val.toLowerCase());
        if(s) { this.curr = s; this.loadStudent(); } else { alert("Invalid Credentials"); }
    },

    saveStudent: function() {
        const mob = document.getElementById('t-mob').value;
        const photoInput = document.getElementById('t-photo');
        
        const save = (img) => {
            const data = {
                mobile: mob,
                name: document.getElementById('t-name').value,
                class: document.getElementById('t-class').value,
                fees: document.getElementById('t-fees').value,
                att: document.getElementById('t-att').value,
                img: img || (this.db.find(x=>x.mobile===mob)?.img || "")
            };
            const idx = this.db.findIndex(x => x.mobile === mob);
            if(idx > -1) this.db[idx] = data; else this.db.push(data);
            localStorage.setItem('rps_pro_db', JSON.stringify(this.db));
            alert("Student Record Updated!");
            this.renderList();
        };

        if(photoInput.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(photoInput.files[0]);
            reader.onload = () => save(reader.result);
        } else { save(); }
    },

    renderList: function() {
        const container = document.getElementById('stu-list-container');
        container.innerHTML = this.db.map(s => `
            <div class="student-row">
                <span><b>${s.name}</b> (${s.mobile})</span>
                <span class="edit-link" onclick="app.editStudent('${s.mobile}')">Edit Profile</span>
            </div>
        `).join('');
    },

    editStudent: function(mob) {
        const s = this.db.find(x => x.mobile === mob);
        document.getElementById('t-mob').value = s.mobile;
        document.getElementById('t-name').value = s.name;
        document.getElementById('t-class').value = s.class;
        document.getElementById('t-fees').value = s.fees;
        document.getElementById('t-att').value = s.att;
        window.scrollTo(0,0);
    },

    updateGlobalContent: function() {
        const type = document.getElementById('content-type').value;
        const val = document.getElementById('content-val').value;
        this.global[type] = val;
        localStorage.setItem('rps_global', JSON.stringify(this.global));
        alert("Published Successfully!");
    },

    loadStudent: function() {
        this.show('sc-student');
        document.getElementById('s-name').innerText = this.curr.name;
        document.getElementById('s-class').innerText = "Class " + this.curr.class;
        document.getElementById('s-att').innerText = this.curr.att + "%";
        document.getElementById('s-fees').innerText = "₹" + this.curr.fees;
        document.getElementById('s-img').src = this.curr.img || 'https://via.placeholder.com/60';
    },

    openDetail: function(title, key) {
        document.getElementById('sc-detail').classList.remove('hidden');
        document.getElementById('det-title').innerText = title;
        document.getElementById('det-body').innerText = this.global[key] || "No data available for " + title;
    },

    closeDetail: function() { document.getElementById('sc-detail').classList.add('hidden'); },

    show: function(id) {
        document.querySelectorAll('.app-shell > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
};
</script>
</body>
    </html>
