<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS JAJOD - Ultimate Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LdpZswsAAAAAAv4bZ5V5xuxwmwPeaJU15bZcuHS"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #1a2a6c; --accent: #b21f1f; --gold: #fdbb2d; --light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #eef2f3; padding-bottom: 50px; }

        /* Header Style */
        header { background: linear-gradient(135deg, var(--main), var(--accent)); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 35px 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }

        /* Login Panel (Jo aapko chahiye tha ❤️) */
        .login-card { background: white; border-radius: 25px; padding: 30px; margin: -30px 20px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .card { background: white; border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h3 { color: var(--main); margin-bottom: 20px; text-align: center; font-weight: 700; }
        h4 { color: var(--accent); margin-bottom: 10px; border-left: 4px solid var(--gold); padding-left: 10px; }

        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1.5px solid #eee; outline: none; font-size: 15px; background: #fafafa; }
        input:focus { border-color: var(--main); background: white; }

        .btn-action { background: var(--main); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; box-shadow: 0 5px 15px rgba(26, 42, 108, 0.3); }
        .btn-action:active { transform: scale(0.98); }

        /* Stats Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 18px; text-align: center; border-bottom: 4px solid var(--gold); }
        
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; margin-bottom: 10px; }
        .status-dot { font-size: 11px; font-weight: 700; background: rgba(0,0,0,0.1); padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 10px; }
        
        .hidden { display: none !important; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; z-index: 1000; font-size: 14px; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<header>
    <button id="logout-btn" class="logout-btn hidden" onclick="sys.logout()">Logout</button>
    <h2 style="font-weight: 800;">RPS PORTAL 2.0</h2>
    <div id="db-status" class="status-dot">● Connecting to Server...</div>
</header>

<div id="screen-login">
    <div class="login-card">
        <h3>Portal Access</h3>
        <label style="font-size: 12px; font-weight: 700; color: #888;">SELECT YOUR ROLE</label>
        <select id="login-role">
            <option value="Principal">Principal (Management)</option>
            <option value="Teacher">Teacher (Staff)</option>
            <option value="Student">Student (Student)</option>
        </select>
        <input type="text" id="login-id" placeholder="Enter ID / Username">
        <input type="password" id="login-pass" placeholder="Enter Security Password">
        <button class="g-recaptcha btn-action" data-sitekey="6LdpZswsAAAAAAv4bZ5V5xuxwmwPeaJU15bZcuHS" data-callback='onLoginSubmit' data-action='submit'>
            LOGIN NOW <i class="fas fa-sign-in-alt" style="margin-left: 8px;"></i>
        </button>
    </div>
</div>

<div id="screen-app" class="hidden">
    <div id="view-principal" class="hidden">
        <div class="grid">
            <div class="stat-box"><h2 id="p-count-t">0</h2><small>Teachers</small></div>
            <div class="stat-box"><h2 id="p-count-s">0</h2><small>Students</small></div>
        </div>
        <div class="card">
            <h4><i class="fas fa-plus-circle"></i> Add New Teacher</h4>
            <input type="text" id="new-t-name" placeholder="Teacher Full Name">
            <input type="text" id="new-t-id" placeholder="Assign Unique ID">
            <input type="text" id="new-t-pass" placeholder="Assign Password">
            <input type="text" id="new-t-classes" placeholder="Classes (e.g. 9,10,11)">
            <select id="new-t-sub">
                <option value="English">English</option>
                <option value="Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="Hindi">Hindi</option>
            </select>
            <button class="btn-action" onclick="sys.saveTeacher()" style="background: var(--gold); color: black;">ACTIVATE TEACHER</button>
        </div>
    </div>

    <div id="view-teacher" class="hidden">
        <div class="card" style="text-align: center; background: var(--main); color: white;">
            <h2 id="t-welcome"></h2>
            <p id="t-info" style="font-size: 13px; opacity: 0.8;"></p>
        </div>
        <div class="card">
            <h4><i class="fas fa-user-plus"></i> Student Admission</h4>
            <select id="t-class-sel"></select>
            <input type="text" id="s-name" placeholder="Student Name">
            <input type="text" id="s-id" placeholder="Roll No / ID">
            <input type="text" id="s-pass" placeholder="Set Student Password">
            <button class="btn-action" onclick="sys.saveStudent()">ENROLL STUDENT</button>
        </div>
        <div class="card">
            <h4><i class="fas fa-edit"></i> Manage Academics</h4>
            <select id="edit-select" onchange="sys.loadStudent()" style="border: 1.5px solid var(--gold);"><option value="">Select Student</option></select>
            <div id="edit-panel" class="hidden" style="text-align: center; margin-top: 15px;">
                <img id="s-preview" class="profile-img" src="">
                <input type="file" accept="image/*" onchange="sys.upPic(event)" style="font-size: 11px;">
                <input type="text" id="e-f" placeholder="Father's Name">
                <input type="text" id="e-att" placeholder="Attendance %">
                <input type="text" id="e-fee" placeholder="Pending Fees (₹)">
                <textarea id="e-hw" placeholder="Write Homework or Notice..."></textarea>
                <button class="btn-action" onclick="sys.updateStudent()">SYNC TO CLOUD</button>
            </div>
        </div>
    </div>

    <div id="view-student" class="hidden">
        <div class="card" style="text-align: center; border-radius: 30px; border-top: 5px solid var(--gold);">
            <img id="st-pic" class="profile-img" src="">
            <h2 id="st-name-head">---</h2>
            <p id="st-meta" style="font-size: 12px; color: #777; font-weight: 700;"></p>
        </div>
        <div class="grid">
            <div class="stat-box" style="border-bottom-color: var(--accent);"><small>FEES DUE</small><h2 id="st-fee" style="color: var(--accent);">₹ 0</h2></div>
            <div class="stat-box" style="border-bottom-color: #28a745;"><small>ATTENDANCE</small><h2 id="st-att">0%</h2></div>
        </div>
        <div class="card">
            <h4><i class="fas fa-bell"></i> Latest Notice</h4>
            <p id="st-hw" style="font-size: 15px; color: #444; line-height: 1.5;"></p>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    function onLoginSubmit(token) { sys.login(); }

    const firebaseConfig = {
        apiKey: "AIzaSyBj8K0fbnu3qZHO8TUOUEV4uOhihLwFEVw",
        authDomain: "rps-sikar-da9d4.firebaseapp.com",
        databaseURL: "https://rps-sikar-da9d4-default-rtdb.firebaseio.com",
        projectId: "rps-sikar-da9d4",
        storageBucket: "rps-sikar-da9d4.firebasestorage.app",
        messagingSenderId: "1075905739210",
        appId: "1:1075905739210:web:0999c29b691d13715fb733"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const sys = {
        user: null,
        tempPic: "",

        showToast: function(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        },

        login: function() {
            const r = document.getElementById('login-role').value;
            const id = document.getElementById('login-id').value.trim();
            const ps = document.getElementById('login-pass').value.trim();

            if(!id || !ps) { this.showToast("⚠️ Enter ID & Password"); return; }

            if(r === "Principal" && id === "Azizkhan" && ps === "khanaziz") {
                this.user = {role:"Principal", name:"Aziz Khan"};
                this.showApp();
            } else {
                const path = (r === "Teacher") ? 'teachers/' + id : 'students/' + id;
                db.ref(path).once('value', snap => {
                    const d = snap.val();
                    if(d && d.pass === ps) { this.user = {...d, role: r}; this.showApp(); }
                    else this.showToast("❌ Invalid Credentials!");
                });
            }
        },

        logout: function() { location.reload(); },

        showApp: function() {
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-app').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            
            const r = this.user.role;
            ['view-principal', 'view-teacher', 'view-student'].forEach(v => document.getElementById(v).classList.add('hidden'));

            if(r === "Principal") {
                document.getElementById('view-principal').classList.remove('hidden');
                this.loadPrincipalStats();
            } else if(r === "Teacher") {
                document.getElementById('view-teacher').classList.remove('hidden');
                document.getElementById('t-welcome').innerText = "Hi, " + this.user.name;
                document.getElementById('t-info').innerText = `Subject: ${this.user.subject} | Classes: ${this.user.classes}`;
                document.getElementById('t-class-sel').innerHTML = this.user.classes.split(',').map(c => `<option value="${c.trim()}">Class ${c.trim()}</option>`).join('');
                this.syncSList();
            } else {
                document.getElementById('view-student').classList.remove('hidden');
                document.getElementById('st-pic').src = this.user.pic || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                document.getElementById('st-name-head').innerText = this.user.name;
                document.getElementById('st-meta').innerText = `CLASS ${this.user.class} | ROLL ${this.user.id}`;
                document.getElementById('st-fee').innerText = "₹ " + (this.user.fee || "0");
                document.getElementById('st-att').innerText = (this.user.att || "0") + "%";
                document.getElementById('st-hw').innerText = this.user.hw || "No updates from teachers yet.";
            }
        },

        loadPrincipalStats: function() {
            db.ref('teachers').on('value', s => document.getElementById('p-count-t').innerText = s.numChildren());
            db.ref('students').on('value', s => document.getElementById('p-count-s').innerText = s.numChildren());
        },

        saveTeacher: function() {
            const id = document.getElementById('new-t-id').value;
            const data = {
                name: document.getElementById('new-t-name').value, id: id,
                pass: document.getElementById('new-t-pass').value,
                classes: document.getElementById('new-t-classes').value,
                subject: document.getElementById('new-t-sub').value
            };
            db.ref('teachers/' + id).set(data).then(() => this.showToast("✅ Teacher Profile Activated!"));
        },

        saveStudent: function() {
            const id = document.getElementById('s-id').value;
            const data = {
                name: document.getElementById('s-name').value, id: id,
                pass: document.getElementById('s-pass').value,
                class: document.getElementById('t-class-sel').value,
                f:"", fee:"0", att:"0", hw:"", pic:""
            };
            db.ref('students/' + id).set(data).then(() => { this.showToast("🎓 Student Enrolled Successfully!"); this.syncSList(); });
        },

        syncSList: function() {
            db.ref('students').once('value', snap => {
                const all = snap.val() || {};
                const cls = (this.user.classes || "").split(',').map(x => x.trim());
                let html = '<option value="">Choose Student</option>';
                for(let id in all) { if(cls.includes(all[id].class)) html += `<option value="${id}">${all[id].name} (Class ${all[id].class})</option>`; }
                document.getElementById('edit-select').innerHTML = html;
            });
        },

        loadStudent: function() {
            const id = document.getElementById('edit-select').value;
            if(!id) { document.getElementById('edit-panel').classList.add('hidden'); return; }
            db.ref('students/' + id).once('value', snap => {
                const s = snap.val();
                document.getElementById('edit-panel').classList.remove('hidden');
                document.getElementById('e-f').value = s.f || "";
                document.getElementById('e-att').value = s.att || "";
                document.getElementById('e-fee').value = s.fee || "";
                document.getElementById('e-hw').value = s.hw || "";
                document.getElementById('s-preview').src = s.pic || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                this.tempPic = s.pic || "";
            });
        },

        upPic: function(e) {
            const reader = new FileReader();
            reader.onload = () => { this.tempPic = reader.result; document.getElementById('s-preview').src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        },

        updateStudent: function() {
            const id = document.getElementById('edit-select').value;
            const updates = {
                f: document.getElementById('e-f').value,
                att: document.getElementById('e-att').value,
                fee: document.getElementById('e-fee').value,
                hw: `[Notice by ${this.user.name}]: ` + document.getElementById('e-hw').value,
                pic: this.tempPic
            };
            db.ref('students/' + id).update(updates).then(() => this.showToast("📊 Records Synced to Live Server!"));
        }
    };

    db.ref(".info/connected").on("value", snap => {
        const s = document.getElementById('db-status');
        if (snap.val() === true) { s.innerText = "● LIVE: SIKAR CLOUD ACTIVE"; s.style.color = "#28a745"; }
        else { s.innerText = "○ OFFLINE: RECONNECTING..."; s.style.color = "#dc3545"; }
    });
</script>
</body>
</html>
