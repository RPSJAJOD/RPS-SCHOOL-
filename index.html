
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Pro - Principal Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #3b82f6; 
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --bg: #f8fafc; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #1e293b; padding-bottom: 90px; }

        /* UI BASICS */
        .glass { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #cbd5e1; outline: none; transition: 0.2s; font-size: 14px; }
        button { background: var(--accent); color: white; border: none; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .btn-sec { background: #f1f5f9; color: #475569; }
        .btn-del { background: var(--danger); }

        /* CARDS */
        .item-card { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .item-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        
        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: 700; }

        .hidden { display: none !important; }
        .status-pill { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 700; color: white; display: inline-block; }
        .Present { background: var(--success); }
        .Absent { background: var(--danger); }
        .Half-Day { background: var(--warning); }
        .Late { background: #6366f1; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 700; color: var(--primary);">SchoolPro Dashboard</div>
    <div id="user-info" style="font-size: 12px; font-weight: 500;"></div>
</header>

<div id="login-view" style="padding: 40px 20px;">
    <div class="glass" style="max-width: 400px; margin: auto;">
        <h2 style="text-align:center; margin-bottom: 20px;">Secure Login</h2>
        <select id="login-role">
            <option value="Principal">Principal (Azizkhan)</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
        </select>
        <input type="text" id="uid" placeholder="ID">
        <input type="password" id="upass" placeholder="Password">
        <button onclick="handleLogin()">Sign In</button>
    </div>
</div>

<div id="principal-view" class="hidden" style="padding: 20px;">
    
    <div class="glass">
        <h3>Teacher Management</h3>
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7;">Add or Edit Teacher Profiles</p>
        <select id="edit-teacher-select" onchange="loadTeacherToEdit()">
            <option value="">-- Select Teacher to Edit --</option>
        </select>
        
        <div id="teacher-edit-form" class="hidden" style="margin-top: 15px; border-top: 2px solid #f1f5f9; padding-top: 15px;">
            <label style="font-size: 12px; font-weight: 600;">Teacher Photo</label>
            <input type="file" id="t-pic-edit" accept="image/*">
            <input type="text" id="t-name-edit" placeholder="Full Name">
            <input type="text" id="t-pass-edit" placeholder="Update Password">
            <input type="text" id="t-sal-edit" placeholder="Monthly Salary (e.g. ₹50,000)">
            <div style="display: flex; gap: 10px;">
                <button onclick="updateTeacherDetails()">Save Profile</button>
                <button class="btn-del" onclick="deleteTeacher()">Delete</button>
            </div>
        </div>

        <button id="add-new-t-btn" class="btn-sec" style="margin-top: 10px;" onclick="showAddTeacherForm()">+ Create New Teacher</button>
    </div>

    <div class="glass">
        <h3>Staff Attendance Ledger</h3>
        <label style="font-size: 12px; font-weight: 600;">Select Date:</label>
        <input type="date" id="attendance-date" onchange="renderTeacherAttendanceList()">
        
        <div id="teacher-attendance-list" style="margin-top: 15px;">
            </div>
        <button id="save-att-btn" class="hidden" onclick="saveStaffAttendance()" style="background: var(--success); margin-top: 10px;">Save Attendance for Date</button>
    </div>
</div>

<div id="other-view" class="hidden" style="padding: 20px;">
    <div class="glass">
        <h2 id="welcome-msg"></h2>
        <p>Accessing your specific data modules...</p>
    </div>
</div>

<div id="nav" class="bottom-nav hidden">
    <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item">📋<br>Reports</div>
    <div class="nav-item">⚙️<br>Settings</div>
    <div class="nav-item" onclick="location.reload()">🚪<br>Logout</div>
</div>

<script>
    // DATA CORE
    let db = {
        teachers: JSON.parse(localStorage.getItem('sp_teachers')) || [],
        teacherAttendance: JSON.parse(localStorage.getItem('sp_teacher_att')) || {} 
        // Structure: { "2026-04-27": { "T1": "Present", "T2": "Late" } }
    };

    let session = null;

    // AUTH
    function handleLogin() {
        const role = document.getElementById('login-role').value;
        const id = document.getElementById('uid').value;
        const pass = document.getElementById('upass').value;

        if (role === "Principal" && id === "Azizkhan" && pass === "khanaziz") {
            session = { role: "Principal", name: "Aziz Khan" };
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('principal-view').classList.remove('hidden');
            document.getElementById('nav').classList.remove('hidden');
            initPrincipal();
        } else {
            alert("This module is specifically optimized for Principal access.");
        }
        
        if (session) {
            document.getElementById('user-info').innerText = session.name + " (" + session.role + ")";
        }
    }

    // PRINCIPAL LOGIC
    function initPrincipal() {
        populateTeacherSelect();
        // Set default date to today
        document.getElementById('attendance-date').valueAsDate = new Date();
        renderTeacherAttendanceList();
    }

    function populateTeacherSelect() {
        const sel = document.getElementById('edit-teacher-select');
        sel.innerHTML = '<option value="">-- Select Teacher to Edit --</option>' + 
            db.teachers.map(t => `<option value="${t.id}">${t.name} (ID: ${t.id})</option>`).join('');
    }

    function showAddTeacherForm() {
        const id = "T" + (db.teachers.length + 1) + Date.now().toString().slice(-3);
        const newTeacher = { id, name: "New Teacher", pass: "1234", sal: "₹0", pic: "" };
        db.teachers.push(newTeacher);
        saveDb();
        populateTeacherSelect();
        document.getElementById('edit-teacher-select').value = id;
        loadTeacherToEdit();
    }

    function loadTeacherToEdit() {
        const id = document.getElementById('edit-teacher-select').value;
        const t = db.teachers.find(x => x.id === id);
        if (!t) {
            document.getElementById('teacher-edit-form').classList.add('hidden');
            return;
        }
        document.getElementById('teacher-edit-form').classList.remove('hidden');
        document.getElementById('t-name-edit').value = t.name;
        document.getElementById('t-pass-edit').value = t.pass;
        document.getElementById('t-sal-edit').value = t.sal;
    }

    function updateTeacherDetails() {
        const id = document.getElementById('edit-teacher-select').value;
        const t = db.teachers.find(x => x.id === id);
        
        t.name = document.getElementById('t-name-edit').value;
        t.pass = document.getElementById('t-pass-edit').value;
        t.sal = document.getElementById('t-sal-edit').value;

        const file = document.getElementById('t-pic-edit').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                t.pic = e.target.result;
                finishUpdate();
            };
            reader.readAsDataURL(file);
        } else {
            finishUpdate();
        }
    }

    function finishUpdate() {
        saveDb();
        populateTeacherSelect();
        renderTeacherAttendanceList();
        alert("Teacher Profile Updated Successfully");
    }

    function deleteTeacher() {
        const id = document.getElementById('edit-teacher-select').value;
        if (confirm("Permanently delete this teacher?")) {
            db.teachers = db.teachers.filter(x => x.id !== id);
            saveDb();
            populateTeacherSelect();
            document.getElementById('teacher-edit-form').classList.add('hidden');
            renderTeacherAttendanceList();
        }
    }

    // ATTENDANCE LOGIC
    function renderTeacherAttendanceList() {
        const date = document.getElementById('attendance-date').value;
        const listDiv = document.getElementById('teacher-attendance-list');
        const saveBtn = document.getElementById('save-att-btn');

        if (!date || db.teachers.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; opacity:0.5;'>No teachers added or date not selected.</p>";
            saveBtn.classList.add('hidden');
            return;
        }

        saveBtn.classList.remove('hidden');
        const dayAtt = db.teacherAttendance[date] || {};

        listDiv.innerHTML = db.teachers.map(t => {
            const currentStatus = dayAtt[t.id] || "Pending";
            return `
                <div class="item-card">
                    <img src="${t.pic || 'https://via.placeholder.com/50'}">
                    <div style="flex:1">
                        <b>${t.name}</b><br>
                        <span class="status-pill ${currentStatus}">${currentStatus}</span>
                    </div>
                    <select style="width: auto; margin:0;" class="att-status-select" data-tid="${t.id}">
                        <option value="Present" ${currentStatus === 'Present' ? 'selected' : ''}>Present</option>
                        <option value="Absent" ${currentStatus === 'Absent' ? 'selected' : ''}>Absent</option>
                        <option value="Half-Day" ${currentStatus === 'Half-Day' ? 'selected' : ''}>Half-Day</option>
                        <option value="Late" ${currentStatus === 'Late' ? 'selected' : ''}>Late</option>
                    </select>
                </div>
            `;
        }).join('');
    }

    function saveStaffAttendance() {
        const date = document.getElementById('attendance-date').value;
        if (!date) return;

        if (!db.teacherAttendance[date]) db.teacherAttendance[date] = {};
        
        const selects = document.querySelectorAll('.att-status-select');
        selects.forEach(sel => {
            const tid = sel.getAttribute('data-tid');
            db.teacherAttendance[date][tid] = sel.value;
        });

        saveDb();
        renderTeacherAttendanceList();
        alert("Attendance Saved for " + date);
    }

    function saveDb() {
        localStorage.setItem('sp_teachers', JSON.stringify(db.teachers));
        localStorage.setItem('sp_teacher_att', JSON.stringify(db.teacherAttendance));
    }
</script>

</body>
</html>
