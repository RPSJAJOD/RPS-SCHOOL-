<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School App Pro - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM GLASS UI */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* LOGIN FORM */
        #login-box {
            width: 90%;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        input, select { background: rgba(255,255,255,0.1); color: white; }
        option { background: #1e293b; color: white; }

        button {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }

        /* DASHBOARD */
        #app { display: none; width: 100%; max-width: 900px; margin: 20px auto; padding: 15px; }
        .hidden { display: none !important; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* TOAST */
        #toast {
            position: fixed; top: 20px; right: 20px; 
            padding: 15px 25px; border-radius: 10px; 
            background: var(--primary); color: #000;
            font-weight: 600; display: none; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="login-box" class="glass">
    <h1 style="margin-bottom: 20px;">School Pro</h1>
    <select id="role">
        <option value="Principal">Principal</option>
        <option value="Teacher">Teacher</option>
        <option value="Student">Student</option>
    </select>
    <input type="text" id="userid" placeholder="User ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Login to Dashboard</button>
</div>

<div id="app">
    <div class="glass" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h2 id="welcome">Dashboard</h2>
        <button onclick="location.reload()" style="width: auto; padding: 8px 15px;">Logout</button>
    </div>

    <div class="nav">
        <button onclick="showTab('teachers-tab')" id="nav-t">Teachers</button>
        <button onclick="showTab('students-tab')" id="nav-s">Students</button>
        <button onclick="showTab('work-tab')">Management</button>
    </div>

    <div id="teachers-tab" class="tab-content">
        <div class="glass">
            <h3>Add Teacher (Max 12)</h3>
            <input type="text" id="t-name" placeholder="Teacher Name">
            <input type="text" id="t-id" placeholder="Teacher Login ID">
            <input type="text" id="t-pass" placeholder="Teacher Password">
            <button onclick="addTeacher()">Save Teacher</button>
            <div id="teacher-list" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div id="students-tab" class="tab-content hidden">
        <div class="glass">
            <h3>Student Database</h3>
            <div id="student-add-form">
                <input type="text" id="s-name" placeholder="Student Name">
                <input type="text" id="s-id" placeholder="Student ID">
                <input type="text" id="s-pass" placeholder="Password">
                <input type="file" id="s-photo" accept="image/*">
                <button onclick="addStudent()">Register Student</button>
            </div>
            <div id="student-list" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div id="work-tab" class="tab-content hidden">
        <div class="glass">
            <h3>Admin Notices & Work</h3>
            <input type="text" id="n-title" placeholder="Title">
            <textarea id="n-body" placeholder="Details..." style="width:100%; background:rgba(255,255,255,0.1); color:white; border-radius:10px; padding:10px; margin:10px 0; border:none;"></textarea>
            <button onclick="addNotice()">Post Notice</button>
            <div id="notice-list" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    // DATA CONFIG
    const PRINCIPAL_LOGINS = [
        {id: "Azizkhan", pass: "khanaziz"},
        {id: "RPS", pass: "JAJ12"}
    ];

    let teachers = JSON.parse(localStorage.getItem('sch_teachers')) || [];
    let students = JSON.parse(localStorage.getItem('sch_students')) || [];
    let notices = JSON.parse(localStorage.getItem('sch_notices')) || [];

    // TOAST SYSTEM
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // LOGIN LOGIC
    function handleLogin() {
        const role = document.getElementById('role').value;
        const user = document.getElementById('userid').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (role === "Principal") {
            const auth = PRINCIPAL_LOGINS.find(p => p.id === user && p.pass === pass);
            if (auth) startApp("Principal", user);
            else showToast("Principal ID/Pass Incorrect");
        } 
        else if (role === "Teacher") {
            const auth = teachers.find(t => t.id === user && t.pass === pass);
            if (auth) startApp("Teacher", auth.name);
            else showToast("Teacher ID/Pass Incorrect");
        }
        else if (role === "Student") {
            const auth = students.find(s => s.id === user && s.pass === pass);
            if (auth) startApp("Student", auth.name);
            else showToast("Student ID/Pass Incorrect");
        }
    }

    function startApp(role, name) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('welcome').innerText = role + ": " + name;

        // Permissions
        if (role === "Teacher") {
            document.getElementById('nav-t').classList.add('hidden');
            showTab('students-tab');
        } else if (role === "Student") {
            document.getElementById('nav-t').classList.add('hidden');
            document.getElementById('student-add-form').classList.add('hidden');
            showTab('work-tab');
        } else {
            showTab('teachers-tab');
        }
        
        renderAll();
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // ACTIONS
    function addTeacher() {
        if (teachers.length >= 12) return showToast("Limit: 12 Teachers");
        const name = document.getElementById('t-name').value;
        const id = document.getElementById('t-id').value;
        const pass = document.getElementById('t-pass').value;

        if(!name || !id || !pass) return showToast("Fill all fields");
        
        teachers.push({name, id, pass});
        localStorage.setItem('sch_teachers', JSON.stringify(teachers));
        renderAll();
        showToast("Teacher Added!");
    }

    function addStudent() {
        const name = document.getElementById('s-name').value;
        const id = document.getElementById('s-id').value;
        const pass = document.getElementById('s-pass').value;
        const file = document.getElementById('s-photo').files[0];

        if(!name || !id || !pass) return showToast("Fill all fields");

        const reader = new FileReader();
        reader.onload = function(e) {
            students.push({name, id, pass, photo: e.target.result});
            localStorage.setItem('sch_students', JSON.stringify(students));
            renderAll();
            showToast("Student Added!");
        }
        if(file) reader.readAsDataURL(file);
        else {
            students.push({name, id, pass, photo: ''});
            localStorage.setItem('sch_students', JSON.stringify(students));
            renderAll();
        }
    }

    function addNotice() {
        const title = document.getElementById('n-title').value;
        const body = document.getElementById('n-body').value;
        if(!title) return;
        notices.push({title, body});
        localStorage.setItem('sch_notices', JSON.stringify(notices));
        renderAll();
        showToast("Notice Posted");
    }

    // RENDERERS
    function renderAll() {
        const tList = document.getElementById('teacher-list');
        tList.innerHTML = teachers.map((t, i) => `
            <div class="card">
                <b>${t.name}</b> (ID: ${t.id})
                <button onclick="deleteItem('teachers', ${i})" style="width:auto; float:right; background:red; color:white; padding:2px 10px;">X</button>
            </div>
        `).join('');

        const sList = document.getElementById('student-list');
        sList.innerHTML = students.map((s, i) => `
            <div class="card" style="display:flex; align-items:center; gap:15px;">
                <img src="${s.photo || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                <div><b>${s.name}</b><br><small>ID: ${s.id}</small></div>
                <button onclick="deleteItem('students', ${i})" style="margin-left:auto; width:auto; background:red; color:white;">X</button>
            </div>
        `).join('');

        const nList = document.getElementById('notice-list');
        nList.innerHTML = notices.map(n => `
            <div class="card">
                <h4 style="color:var(--primary)">${n.title}</h4>
                <p>${n.body}</p>
            </div>
        `).join('');
    }

    function deleteItem(type, index) {
        if(type === 'teachers') teachers.splice(index, 1);
        else students.splice(index, 1);
        localStorage.setItem('sch_' + type, JSON.stringify(type === 'teachers' ? teachers : students));
        renderAll();
    }
</script>

</body>
</html>
