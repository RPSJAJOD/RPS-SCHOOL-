<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Pro - Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--primary); padding-bottom: 80px; }

        /* UI COMPONENTS */
        .glass { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        header { background: #1e293b; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        button { background: var(--accent); color: white; font-weight: 600; border: none; cursor: pointer; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-sm { width: auto; padding: 5px 15px; font-size: 12px; }

        /* DRAWER */
        #drawer { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.2); }
        #drawer.active { left: 0; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 1500; display:none; }

        /* ATTENDANCE SYSTEM */
        .att-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .present { background: var(--success); }
        .absent { background: var(--danger); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 10px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-center { background: var(--accent); width: 55px; height: 55px; border-radius: 50%; margin-top: -35px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); }

        .hidden { display: none !important; }
        .editable-field { border: 1px dashed var(--accent) !important; background: #f0f7ff !important; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div id="drawer">
    <div style="text-align:center; margin-bottom:20px;">
        <img id="user-pfp" src="https://via.placeholder.com/80" style="border-radius:50%; width:80px; height:80px; border:3px solid var(--accent);">
        <h3 id="user-name-side">Admin Name</h3>
        <p id="user-role-side" style="font-size:12px; color:var(--accent);">Principal</p>
    </div>
    <div style="margin-top:30px;">
        <div style="padding:15px 0; border-bottom:1px solid #eee;">🏠 Dashboard</div>
        <div style="padding:15px 0; border-bottom:1px solid #eee;">⚙️ Account Settings</div>
        <div style="padding:15px 0; border-bottom:1px solid #eee;">🔒 Privacy Policy</div>
        <div style="padding:15px 0; color:var(--danger);" onclick="location.reload()">🚪 Logout</div>
    </div>
</div>

<header>
    <div onclick="toggleDrawer()">☰</div>
    <div id="header-title">School Pro</div>
    <div>🔔</div>
</header>

<div id="login-section" style="padding:20px; max-width:400px; margin: 50px auto;">
    <div class="glass" style="text-align:center;">
        <h2>Login</h2>
        <select id="login-role">
            <option value="Principal">Principal</option>
            <option value="Teacher">Teacher</option>
            <option value="Parent">Parent/Student</option>
        </select>
        <input type="text" id="login-id" placeholder="ID">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
    </div>
</div>

<main id="app-section" class="hidden" style="padding:15px;">
    
    <section id="view-principal" class="hidden">
        <div class="glass">
            <h3>Add/Edit Teacher</h3>
            <input type="text" id="teach-name" placeholder="Teacher Name">
            <input type="text" id="teach-id" placeholder="Login ID">
            <input type="text" id="teach-pass" placeholder="Password">
            <input type="file" id="teach-pic" accept="image/*">
            <button onclick="saveTeacher()">Save Teacher Account</button>
        </div>
        <div id="principal-teacher-list"></div>
    </section>

    <section id="view-teacher" class="hidden">
        <div class="glass" id="attendance-box">
            <h3>Daily Attendance</h3>
            <p style="font-size:12px; margin-bottom:10px;">Date: <span id="current-date"></span></p>
            <div id="attendance-list"></div>
            <button onclick="submitAttendance()" style="margin-top:15px; background:var(--success);">Submit Attendance</button>
        </div>
        
        <div class="glass">
            <h3>Edit Student Details</h3>
            <div id="teacher-student-list"></div>
        </div>
    </section>

    <section id="view-parent" class="hidden">
        <div class="glass" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white;">
            <p>Good Afternoon 👋</p>
            <h2 id="parent-display-name">User</h2>
            <div style="display:flex; justify-content:space-between; margin-top:15px; align-items:center;">
                <div id="active-child-info">
                    <b>Child Name</b><br><small>Class 12-COMM</small>
                </div>
                <button class="btn-sm" onclick="switchChild()">Switch Child ▿</button>
            </div>
        </div>
        <div class="glass" id="child-profile-card">
            </div>
    </section>

</main>

<div class="bottom-nav hidden" id="main-nav">
    <div class="nav-item active" onclick="showTab('home')">🏠<br>Home</div>
    <div class="nav-item" onclick="showTab('child')">👤<br>Profile</div>
    <div class="nav-center">▦</div>
    <div class="nav-item">🔔<br>Updates</div>
    <div class="nav-item">🏢<br>News</div>
</div>

<script>
    // DATA CORE
    let db = {
        teachers: JSON.parse(localStorage.getItem('sp_teachers')) || [],
        students: JSON.parse(localStorage.getItem('sp_students')) || [
            {id: 'S1', name: 'TANISHA TAILOR', class: '12-COMM', sr: '1229', father: 'PARTURAM', mother: 'SANGEETA', contact: '6378154691', att: []},
            {id: 'S2', name: 'BHANU', class: '11-COMM', sr: '1340', father: 'PARTURAM', mother: 'SANGEETA', contact: '6378154691', att: []}
        ],
        attendance: JSON.parse(localStorage.getItem('sp_att')) || {}
    };

    let currentUser = null;
    let activeChildIdx = 0;

    function handleLogin() {
        const role = document.getElementById('login-role').value;
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-pass').value;

        if(role === "Principal" && id === "Azizkhan" && pass === "khanaziz") {
            currentUser = {role: "Principal", name: "Aziz Khan"};
        } else if(role === "Teacher") {
            const t = db.teachers.find(x => x.id === id && x.pass === pass);
            if(t) currentUser = {...t, role: "Teacher"};
        } else if(role === "Parent") {
            currentUser = {role: "Parent", name: "PARTURAM"};
        }

        if(currentUser) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            setupView();
        } else alert("Invalid Credentials");
    }

    function setupView() {
        document.getElementById('user-name-side').innerText = currentUser.name;
        document.getElementById('user-role-side').innerText = currentUser.role;
        
        // Reset views
        ['view-principal', 'view-teacher', 'view-parent'].forEach(id => document.getElementById(id).classList.add('hidden'));

        if(currentUser.role === "Principal") {
            document.getElementById('view-principal').classList.remove('hidden');
            renderPrincipal();
        } else if(currentUser.role === "Teacher") {
            document.getElementById('view-teacher').classList.remove('hidden');
            document.getElementById('current-date').innerText = new Date().toLocaleDateString();
            renderTeacher();
        } else {
            document.getElementById('view-parent').classList.remove('hidden');
            renderParent();
        }
    }

    // PRINCIPAL FUNCTIONS
    function saveTeacher() {
        const name = document.getElementById('teach-name').value;
        const id = document.getElementById('teach-id').value;
        const pass = document.getElementById('teach-pass').value;
        const file = document.getElementById('teach-pic').files[0];

        const reader = new FileReader();
        reader.onload = (e) => {
            db.teachers.push({name, id, pass, pic: e.target.result});
            localStorage.setItem('sp_teachers', JSON.stringify(db.teachers));
            renderPrincipal();
        };
        if(file) reader.readAsDataURL(file);
        else {
            db.teachers.push({name, id, pass, pic: 'https://via.placeholder.com/50'});
            localStorage.setItem('sp_teachers', JSON.stringify(db.teachers));
            renderPrincipal();
        }
    }

    function renderPrincipal() {
        document.getElementById('principal-teacher-list').innerHTML = `<h3>Staff List</h3>` + db.teachers.map(t => `
            <div class="glass" style="display:flex; align-items:center; gap:10px;">
                <img src="${t.pic}" style="width:40px; height:40px; border-radius:50%;">
                <div><b>${t.name}</b><br><small>ID: ${t.id}</small></div>
            </div>
        `).join('');
    }

    // TEACHER FUNCTIONS
    function renderTeacher() {
        const list = document.getElementById('attendance-list');
        list.innerHTML = db.students.map(s => `
            <div class="att-row">
                <span>${s.name}</span>
                <select style="width:auto; margin:0;" onchange="updateAttStatus('${s.id}', this.value)">
                    <option value="P">Present</option>
                    <option value="A">Absent</option>
                </select>
            </div>
        `).join('');

        const sList = document.getElementById('teacher-student-list');
        sList.innerHTML = db.students.map((s, i) => `
            <div class="card" style="border:1px solid #eee; padding:10px; border-radius:10px; margin-bottom:10px;">
                <input class="editable-field" value="${s.name}" onchange="editStudent(${i}, 'name', this.value)">
                <input class="editable-field" value="${s.father}" onchange="editStudent(${i}, 'father', this.value)">
                <input class="editable-field" value="${s.contact}" onchange="editStudent(${i}, 'contact', this.value)">
            </div>
        `).join('');
    }

    function editStudent(index, field, value) {
        db.students[index][field] = value;
        localStorage.setItem('sp_students', JSON.stringify(db.students));
        alert("Updated " + field);
    }

    function submitAttendance() {
        alert("Attendance for " + db.students.length + " students submitted successfully!");
    }

    // PARENT FUNCTIONS
    function renderParent() {
        const child = db.students[activeChildIdx];
        document.getElementById('parent-display-name').innerText = currentUser.name;
        document.getElementById('active-child-info').innerHTML = `<b>${child.name}</b><br><small>Class ${child.class}</small>`;
        
        document.getElementById('child-profile-card').innerHTML = `
            <div style="text-align:center; margin-bottom:15px;">
                <img src="https://via.placeholder.com/100" style="border-radius:50%; border:3px solid var(--accent);">
                <h4>${child.name}</h4>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="glass" style="margin:0;"><span>SR No</span><p>${child.sr}</p></div>
                <div class="glass" style="margin:0;"><span>Roll No</span><p>118${activeChildIdx}</p></div>
                <div class="glass" style="margin:0; grid-column:span 2;"><span>Father</span><p>${child.father}</p></div>
                <div class="glass" style="margin:0; grid-column:span 2;"><span>Contact</span><p>${child.contact}</p></div>
            </div>
        `;
    }

    function switchChild() {
        activeChildIdx = activeChildIdx === 0 ? 1 : 0;
        renderParent();
    }

    function toggleDrawer() {
        const d = document.getElementById('drawer');
        const o = document.getElementById('overlay');
        d.classList.toggle('active');
        o.style.display = d.classList.contains('active') ? 'block' : 'none';
    }

    function showTab(tab) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        // In this simple version, we just toggle UI elements. 
        // Real tab logic would hide/show sections.
    }
</script>

</body>
</html>
